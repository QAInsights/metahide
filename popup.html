<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
    <h1>MetaHide</h1>
  </div>

  <div class="toggle-list">
    <div class="toggle-item">
      <span class="toggle-label">New Chat</span>
      <label class="switch">
        <input type="checkbox" id="toggle-newchat" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-item">
      <span class="toggle-label">Search</span>
      <label class="switch">
        <input type="checkbox" id="toggle-search" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-item">
      <span class="toggle-label">Vibes</span>
      <label class="switch">
        <input type="checkbox" id="toggle-vibes" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-item">
      <span class="toggle-label">Create</span>
      <label class="switch">
        <input type="checkbox" id="toggle-create" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="footer">
    <a href="https://qainsights.com" target="_blank" title="About">
      <!-- User/About icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="7" r="4"/>
        <path d="M5.5 21a6.5 6.5 0 0 1 13 0"/>
      </svg>
    </a>
    <a href="https://github.com/QAInsights/metahide" target="_blank" title="GitHub">
      <!-- GitHub icon -->
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
    <a href="https://buymeacoffee.com/qainsights" target="_blank" title="Donate">
      <!-- Coffee/Donate icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/>
        <line x1="10" y1="1" x2="10" y2="4"/>
        <line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
